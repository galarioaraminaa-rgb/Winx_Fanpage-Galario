<!DOCTYPE html>
<html>
<head>
    <title>Winx Fanbase</title>
    <style>
        body {
            font-family: Arial;
            background: #f3e5f5;
            padding: 20px;
        }
        h1 {
            color: purple;
        }
        .card {
            background: white;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            cursor: pointer;
        }
        .card:hover {
            background: #f8bbd0;
        }
    </style>
</head>
<body>

<h1>🧚 Winx Characters</h1>

<button onclick="loadCharacters()">Load Characters</button>

<div id="characters"></div>

<h2>Character Details</h2>
<div id="details"></div>

<h2>Actors</h2>
<button onclick="loadActors()">Load Actors</button>
<div id="actors"></div>

<script>
async function loadCharacters() {
    const res = await fetch('/characters');
    const data = await res.json();

    const container = document.getElementById('characters');
    container.innerHTML = "";

    data.forEach(char => {
        const div = document.createElement('div');
        div.className = "card";
        div.innerText = char.name + " (" + char.fairy_type + ")";
        div.onclick = () => getCharacter(char.id);
        container.appendChild(div);
    });
}

async function getCharacter(id) {
    const res = await fetch('/characters/' + id);
    const char = await res.json();

    const details = document.getElementById('details');
    details.innerHTML = `
        <div class="card">
            <h3>${char.name}</h3>
            <p><b>Type:</b> ${char.fairy_type}</p>
            <p><b>World:</b> ${char.home_world}</p>
            <p>${char.description}</p>
        </div>
    `;
}

async function loadActors() {
    const res = await fetch('/actors');
    const data = await res.json();

    const container = document.getElementById('actors');
    container.innerHTML = "";

    data.forEach(actor => {
        const div = document.createElement('div');
        div.className = "card";
        div.innerHTML = `
            <b>${actor.name}</b> (${actor.nationality})<br>
            Character: ${actor.character}
        `;
        container.appendChild(div);
    });
}
</script>

</body>
</html>
